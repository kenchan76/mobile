  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    font-family: 'M PLUS Rounded 1c', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(700px 500px at 0% 0%, #ffd6e8 0%, transparent 55%),
      radial-gradient(700px 500px at 100% 0%, #d6c4f0 0%, transparent 60%),
      radial-gradient(800px 600px at 50% 110%, #c4d8f0 0%, transparent 55%),
      linear-gradient(180deg, #fff0f5 0%, #f4ecff 100%);
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    position: relative;
  }

  /* WiFi wave decorations floating in background */
  body::before, body::after {
    content: "";
    position: fixed;
    pointer-events: none;
    z-index: 0;
    opacity: .6;
    background-repeat: no-repeat;
  }
  body::before {
    top: 8%; left: -20px;
    width: 80px; height: 80px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><g fill='none' stroke='%23ff7ba8' stroke-width='6' stroke-linecap='round'><path d='M30 70 Q50 50 70 70'/><path d='M22 60 Q50 30 78 60'/><path d='M14 50 Q50 10 86 50'/></g><circle cx='50' cy='80' r='5' fill='%23ff7ba8'/></svg>");
    background-size: contain;
    animation: drift 6s ease-in-out infinite;
  }
  body::after {
    bottom: 22%; right: -15px;
    width: 70px; height: 70px;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><g fill='none' stroke='%23b48fe0' stroke-width='6' stroke-linecap='round'><path d='M30 70 Q50 50 70 70'/><path d='M22 60 Q50 30 78 60'/><path d='M14 50 Q50 10 86 50'/></g><circle cx='50' cy='80' r='5' fill='%23b48fe0'/></svg>");
    background-size: contain;
    animation: drift 7s ease-in-out infinite reverse;
  }
  @keyframes drift {
    0%, 100% { transform: translateY(0) rotate(-8deg); }
    50% { transform: translateY(-8px) rotate(8deg); }
  }

  .app {
    height: 100vh;
    height: 100dvh;
    max-width: 440px;
    margin: 0 auto;
    padding: 10px 12px;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 8px;
    position: relative;
    z-index: 1;
  }

  /* HEADER */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 4px 6px 0;
    gap: 10px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }
  .brand-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background-image: var(--mascot);
    background-size: cover;
    background-position: center;
    box-shadow:
      0 2px 0 #ffa5c3,
      0 4px 12px rgba(255, 90, 140, .25);
    flex-shrink: 0;
    animation: wobble 3s ease-in-out infinite;
  }
  @keyframes wobble {
    0%, 100% { transform: rotate(-3deg); }
    50% { transform: rotate(3deg); }
  }
  .brand-text {
    line-height: 1.1;
    min-width: 0;
  }
  .brand-name {
    font-weight: 900;
    font-size: 15px;
    color: var(--ink);
    letter-spacing: -.01em;
    white-space: nowrap;
  }
  .sim-display {
    margin-top: 2px;
    border: none;
    background: linear-gradient(135deg, #fff0f6, #f4ecff);
    color: var(--ink);
    font-family: inherit;
    font-weight: 800;
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 999px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 3px;
    box-shadow: 0 1px 0 var(--pink-soft);
    font-variant-numeric: tabular-nums;
    max-width: 100%;
    white-space: nowrap;
  }
  .sim-display::after {
    content: "▼";
    font-size: 7px;
    margin-left: 2px;
    color: var(--ink-soft);
  }
  .sim-display:active { transform: translateY(1px); box-shadow: 0 0 0 var(--pink-soft); }
  .sim-display.is-empty { color: var(--ink-soft); }
  .premium-badge {
    background: linear-gradient(135deg, var(--yellow), #ff9d5c);
    color: #5a2a0a;
    font-weight: 900;
    font-size: 10px;
    padding: 5px 10px;
    border-radius: 999px;
    box-shadow: 0 2px 0 #d68a35;
    display: none;
    flex-shrink: 0;
  }
  .premium-badge.show { display: inline-block; }

  /* MAIN */
  main {
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 8px;
    min-height: 0;
  }
  .panel {
    background: var(--paper);
    border-radius: var(--radius-l);
    padding: 14px;
    border: 2px solid #fff;
    box-shadow:
      0 3px 0 rgba(255, 123, 168, .15),
      0 10px 28px rgba(180, 120, 180, .12);
    position: relative;
  }

  .panel-label {
    font-size: 11px;
    font-weight: 800;
    color: var(--ink-soft);
    text-align: center;
    letter-spacing: .15em;
    margin-bottom: 8px;
  }
  .amount-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
  }
  .amount-btn {
    border: none;
    cursor: pointer;
    font-family: inherit;
    background: white;
    border-radius: var(--radius-m);
    padding: 10px 2px 8px;
    position: relative;
    transition: transform .08s ease;
    line-height: 1;
    aspect-ratio: 1 / 1.25;
    overflow: visible;
  }
  .amount-btn .ico {
    font-size: 22px;
    display: block;
    margin-bottom: 3px;
    filter: drop-shadow(0 2px 0 rgba(0,0,0,.06));
  }
  .amount-btn .num {
    font-size: 16px;
    font-weight: 900;
    color: var(--ink);
    line-height: 1;
  }
  .amount-btn .unit {
    font-size: 8px;
    font-weight: 800;
    color: var(--ink-soft);
    margin-top: 2px;
  }
  .amount-btn[data-mb="100"] { box-shadow: 0 4px 0 #cdf2e3; }
  .amount-btn[data-mb="200"] { box-shadow: 0 4px 0 var(--blue-soft); }
  .amount-btn[data-mb="250"] { box-shadow: 0 4px 0 var(--purple-soft); }
  .amount-btn[data-mb="300"] { box-shadow: 0 4px 0 #fff0ce; }
  .amount-btn[data-mb="500"] {
    box-shadow: 0 4px 0 var(--pink-soft);
    background: linear-gradient(170deg, #fff, #fff0f6);
  }
  .amount-btn[data-mb="500"]::after {
    content: "🔥";
    position: absolute;
    top: -5px; right: -5px;
    font-size: 10px;
    background: var(--pink-hot);
    width: 18px; height: 18px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 0 #c4256d;
  }
  .amount-btn:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 currentColor !important;
  }
  .amount-btn:disabled {
    opacity: .4;
    filter: grayscale(.4);
    pointer-events: none;
  }
  .amount-btn:disabled::after { opacity: .5; }

  /* PROGRESS */
  .progress-view { text-align: center; padding: 2px 0 0; position: relative; }
  .ring-wrap {
    position: relative;
    width: 158px; height: 158px;
    margin: 0 auto 8px;
  }
  .ring {
    transform: rotate(-90deg);
    width: 100%; height: 100%;
  }
  .ring__track { fill: none; stroke: #f7e8ef; stroke-width: 14; }
  .ring__bar {
    fill: none;
    stroke: url(#rainbow);
    stroke-width: 14;
    stroke-linecap: round;
    stroke-dasharray: 0 999;
    transition: stroke-dasharray .2s ease;
    filter: drop-shadow(0 2px 4px rgba(255, 90, 140, .25));
  }
  .ring-center {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }
  .now-mb {
    font-size: 36px;
    font-weight: 900;
    line-height: 1;
    font-variant-numeric: tabular-nums;
    background: linear-gradient(135deg, var(--pink-hot), var(--purple));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    letter-spacing: -.02em;
  }
  .now-mb small {
    font-size: 13px;
    margin-left: 2px;
    -webkit-text-fill-color: var(--ink-soft);
    font-weight: 800;
  }
  .now-target {
    font-size: 10px;
    color: var(--ink-soft);
    font-weight: 700;
    margin-top: 3px;
  }
  .now-target b { color: var(--ink); }
  /* Bunny watching from corner */
  .ring-bunny {
    position: absolute;
    bottom: -2px; right: 6px;
    width: 42px; height: 42px;
    background-image: var(--mascot);
    background-size: cover;
    background-position: center;
    border-radius: 12px;
    box-shadow: 0 2px 0 var(--pink-mid), 0 4px 10px rgba(255,90,140,.25);
    animation: bunce 1.4s ease-in-out infinite;
  }
  @keyframes bunce {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50% { transform: translateY(-4px) rotate(4deg); }
  }
  .pstats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-bottom: 8px;
  }
  .pstat {
    background: #fff3f7;
    border-radius: var(--radius-s);
    padding: 6px 4px;
    text-align: center;
  }
  .pstat-l { font-size: 9px; color: var(--ink-soft); font-weight: 800; margin-bottom: 2px; letter-spacing: .05em; }
  .pstat-v { font-size: 13px; font-weight: 900; color: var(--ink); }
  .pstat-u { font-size: 9px; color: var(--ink-soft); margin-left: 1px; font-weight: 700; }
  .cancel-btn {
    border: 2px solid var(--pink-hot);
    cursor: pointer; font-family: inherit;
    font-weight: 900; font-size: 13px;
    padding: 10px 24px;
    border-radius: 999px;
    background: white;
    color: var(--pink-hot);
    box-shadow: 0 3px 0 var(--pink-soft);
    width: 80%;
    letter-spacing: .02em;
  }
  .cancel-btn:active {
    transform: translateY(2px);
    box-shadow: 0 1px 0 var(--pink-soft);
    background: var(--pink-hot);
    color: white;
  }

  /* COMPLETE */
  .complete-view {
    text-align: center;
    padding: 2px 0 0;
    position: relative;
  }
  .complete-bunny {
    width: 88px; height: 88px;
    margin: 4px auto 6px;
    background-image: var(--mascot);
    background-size: cover;
    background-position: center;
    border-radius: 22px;
    box-shadow:
      0 5px 0 var(--pink-mid),
      0 10px 22px rgba(255,90,140,.30);
    animation: pop .5s cubic-bezier(.34,1.56,.64,1);
    position: relative;
  }
  .complete-bunny::after {
    content: "✓";
    position: absolute;
    right: -10px; bottom: -8px;
    width: 30px; height: 30px;
    background: linear-gradient(135deg, var(--mint), #3eb88f);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    color: white;
    font-size: 18px;
    font-weight: 900;
    box-shadow: 0 2px 0 #2e9974, 0 4px 8px rgba(60,160,120,.25);
    border: 2px solid white;
  }
  @keyframes pop {
    0% { transform: scale(0); }
    60% { transform: scale(1.15); }
    100% { transform: scale(1); }
  }
  .ctitle {
    font-size: 19px;
    font-weight: 900;
    margin: 2px 0;
    background: linear-gradient(135deg, var(--pink-hot), var(--purple));
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .csub { color: var(--ink-soft); font-size: 11px; font-weight: 700; margin-bottom: 8px; }
  .cstats { display: flex; justify-content: center; gap: 6px; margin-bottom: 10px; }
  .cstats .pstat {
    background: #fff3f7;
    min-width: 70px;
  }
  .again-btn {
    border: none; cursor: pointer; font-family: inherit;
    font-weight: 900; font-size: 13px;
    padding: 10px 24px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--pink-hot), var(--purple));
    color: white;
    box-shadow: 0 4px 0 #c4256d;
    width: 70%;
  }
  .again-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #c4256d; }
  .confetti {
    position: absolute; inset: 0;
    pointer-events: none; overflow: hidden;
  }
  .confetti span {
    position: absolute;
    top: -10px;
    width: 7px; height: 12px;
    border-radius: 2px;
    animation: fall 1.8s ease-out forwards;
  }
  @keyframes fall {
    0% { transform: translateY(-20px) rotate(0); opacity: 1; }
    100% { transform: translateY(280px) rotate(720deg); opacity: 0; }
  }

  /* HISTORY */
  .history-panel {
    background: var(--paper);
    border-radius: var(--radius-l);
    padding: 12px 14px 10px;
    border: 2px solid #fff;
    box-shadow:
      0 3px 0 rgba(140,170,255,.12),
      0 10px 28px rgba(120,150,200,.10);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .history-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 6px;
    flex-shrink: 0;
  }
  .history-head h3 {
    margin: 0;
    font-size: 12px;
    font-weight: 800;
    color: var(--ink-soft);
    letter-spacing: .12em;
  }
  .history-clear {
    background: none; border: none;
    color: var(--ink-faint);
    font-family: inherit; font-size: 10px; font-weight: 700;
    cursor: pointer;
    padding: 2px 6px;
  }
  .history-clear.hide { display: none; }
  .history-list {
    list-style: none;
    margin: 0; padding: 0;
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
  }
  .history-row {
    display: grid;
    grid-template-columns: 48px 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 5px 2px;
    border-bottom: 1px dashed var(--line);
    font-size: 11px;
    flex: 1;
    min-height: 0;
  }
  .history-row:last-child { border-bottom: none; }
  .hr-amount {
    color: white;
    font-weight: 900;
    font-size: 11px;
    padding: 3px 6px;
    border-radius: 8px;
    text-align: center;
    line-height: 1;
  }
  .hr-amount.s100 { background: linear-gradient(135deg, var(--mint), #3eb88f); }
  .hr-amount.s200 { background: linear-gradient(135deg, var(--blue), #3d8fd1); }
  .hr-amount.s250 { background: linear-gradient(135deg, var(--purple), #8a5fc0); }
  .hr-amount.s300 { background: linear-gradient(135deg, var(--yellow), #e6a13a); }
  .hr-amount.s500 { background: linear-gradient(135deg, var(--pink-hot), var(--purple)); }
  .hr-info {
    min-width: 0;
    line-height: 1.2;
  }
  .hr-phone {
    font-size: 11px;
    font-weight: 800;
    color: var(--ink);
    font-variant-numeric: tabular-nums;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .hr-phone.empty { color: var(--ink-faint); font-weight: 700; }
  .hr-time {
    color: var(--ink-soft);
    font-weight: 700;
    font-size: 9px;
    margin-top: 1px;
  }
  .hr-meta {
    text-align: right;
    font-size: 9px;
    color: var(--ink-soft);
    font-weight: 700;
    white-space: nowrap;
    line-height: 1.2;
  }
  .hr-meta b {
    color: var(--ink);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
    display: block;
  }
  .history-empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    color: var(--ink-faint);
    font-size: 11px;
    font-weight: 700;
    text-align: center;
    gap: 4px;
  }
  .history-empty .bunny-mini {
    width: 38px; height: 38px;
    background-image: var(--mascot);
    background-size: cover;
    border-radius: 10px;
    opacity: .5;
    filter: grayscale(.3);
  }

  /* PREMIUM */
  .premium-bar {
    background: linear-gradient(100deg, #fff4d6 0%, #ffe2cc 60%, #ffd6e3 100%);
    border-radius: var(--radius-m);
    padding: 8px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    border: 1.5px solid rgba(255, 192, 77, .4);
    box-shadow: 0 2px 0 rgba(220,170,80,.15);
  }
  .premium-bar.is-active {
    background: linear-gradient(100deg, #d4f5e8, #c8edd9);
    border-color: rgba(77, 208, 168, .4);
    box-shadow: 0 2px 0 rgba(80,180,150,.15);
  }
  .premium-text {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 11px;
    font-weight: 800;
    color: #6b3a0a;
    line-height: 1.2;
  }
  .premium-bar.is-active .premium-text { color: #1a5840; }
  .premium-text .em { font-size: 18px; }
  .premium-text b { font-size: 14px; }
  .premium-text small { font-size: 9px; font-weight: 700; opacity: .7; }
  .premium-btn {
    border: none; cursor: pointer; font-family: inherit;
    font-weight: 900; font-size: 11px;
    padding: 7px 12px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--yellow), #ff9d5c);
    color: #5a2a0a;
    box-shadow: 0 2px 0 #d68a35;
    white-space: nowrap;
  }
  .premium-btn:active { transform: translateY(2px); box-shadow: 0 0 0 #d68a35; }
  .premium-bar.is-active .premium-btn {
    background: white;
    color: var(--ink-soft);
    box-shadow: 0 2px 0 rgba(0,0,0,.08);
  }

  .hidden { display: none !important; }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 80px; left: 50%;
    transform: translateX(-50%);
    background: var(--ink);
    color: white;
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 800;
    box-shadow: 0 8px 20px rgba(0,0,0,.25);
    z-index: 200;
    animation: tin .3s ease;
  }
  @keyframes tin {
    from { opacity: 0; transform: translate(-50%, 8px); }
    to { opacity: 1; transform: translate(-50%, 0); }
  }

  /* AD MODAL */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(74, 46, 95, .55);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 24px;
    animation: fadein .2s ease;
  }
  @keyframes fadein { from { opacity: 0; } to { opacity: 1; } }
  .modal {
    background: white;
    border-radius: var(--radius-l);
    padding: 20px;
    max-width: 340px;
    width: 100%;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,.3);
  }
  .ad-label {
    display: inline-block;
    background: #fff0d0;
    color: #b8650a;
    font-size: 10px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 999px;
    margin-bottom: 12px;
  }
  .ad-content {
    background: linear-gradient(135deg, #fff8e7, #ffe9c2);
    border-radius: 14px;
    padding: 24px 16px;
    font-family: 'DotGothic16', monospace;
    font-size: 14px;
    color: #6b3a0a;
    font-weight: 700;
    line-height: 1.6;
  }
  .ad-content .big {
    font-size: 20px;
    color: var(--pink-hot);
    display: block;
    margin: 6px 0;
  }
  .ad-close {
    margin-top: 12px;
    border: none; cursor: pointer; font-family: inherit;
    font-weight: 900; font-size: 13px;
    padding: 10px;
    border-radius: 999px;
    background: linear-gradient(135deg, var(--pink-hot), var(--purple));
    color: white;
    box-shadow: 0 4px 0 #c4256d;
    width: 100%;
  }
  .ad-close:active { transform: translateY(2px); box-shadow: 0 1px 0 #c4256d; }
  .ad-close:disabled {
    opacity: .5; cursor: wait;
    background: var(--ink-faint); box-shadow: 0 4px 0 #9a8aa6;
  }
  .ad-note {
    font-size: 10px;
    color: var(--ink-soft);
    margin-top: 6px;
    font-weight: 600;
  }

  /* SIM MODAL */
  .modal-title {
    margin: 0 0 4px;
    font-size: 16px;
    font-weight: 900;
    color: var(--ink);
  }
  .modal-sub {
    margin: 0 0 14px;
    font-size: 11px;
    color: var(--ink-soft);
    font-weight: 600;
    line-height: 1.4;
  }
  .sim-input-wrap {
    position: relative;
    margin-bottom: 14px;
  }
  .sim-input-wrap::before {
    content: "📱";
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 16px;
  }
  #simInput {
    width: 100%;
    border: 2px solid var(--pink-soft);
    border-radius: 14px;
    padding: 12px 14px 12px 38px;
    font-family: inherit;
    font-size: 16px;
    font-weight: 800;
    color: var(--ink);
    background: white;
    font-variant-numeric: tabular-nums;
    letter-spacing: .02em;
  }
  #simInput:focus {
    outline: none;
    border-color: var(--pink-hot);
  }
  .sim-list-label {
    font-size: 10px;
    font-weight: 800;
    color: var(--ink-soft);
    margin-bottom: 6px;
    letter-spacing: .1em;
    text-align: left;
  }
  .sim-list-label.hide { display: none; }
  .sim-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    margin-bottom: 16px;
    max-height: 140px;
    overflow-y: auto;
  }
  .sim-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #fff5f8;
    border: 2px solid transparent;
    border-radius: 12px;
    padding: 8px 10px;
    font-family: inherit;
    font-weight: 800;
    font-size: 13px;
    color: var(--ink);
    cursor: pointer;
    font-variant-numeric: tabular-nums;
  }
  .sim-item.is-active {
    background: linear-gradient(100deg, #fff0f6, #f4ecff);
    border-color: var(--pink);
  }
  .sim-item .sim-num {
    flex: 1;
    text-align: left;
  }
  .sim-item .sim-tag {
    font-size: 9px;
    font-weight: 800;
    color: white;
    background: var(--pink-hot);
    padding: 2px 6px;
    border-radius: 999px;
    margin-right: 6px;
  }
  .sim-del {
    background: none;
    border: none;
    color: var(--ink-faint);
    font-size: 16px;
    font-weight: 900;
    cursor: pointer;
    padding: 2px 4px;
    line-height: 1;
  }
  .sim-del:active { color: var(--pink-hot); }
  .modal-actions {
    display: grid;
    grid-template-columns: 1fr 1.4fr;
    gap: 8px;
  }
  .modal-btn, .modal-btn-sub {
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-weight: 900;
    font-size: 13px;
    padding: 11px;
    border-radius: 999px;
  }
  .modal-btn {
    background: linear-gradient(135deg, var(--pink-hot), var(--purple));
    color: white;
    box-shadow: 0 3px 0 #c4256d;
  }
  .modal-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #c4256d; }
  .modal-btn:disabled {
    opacity: .4; cursor: not-allowed;
    background: var(--ink-faint); box-shadow: 0 3px 0 #9a8aa6;
  }
  .modal-btn-sub {
    background: white;
    color: var(--ink-soft);
    box-shadow: 0 3px 0 var(--line);
  }
  .modal-btn-sub:active { transform: translateY(2px); box-shadow: 0 1px 0 var(--line); }

  @media (max-height: 640px) {
    .ring-wrap { width: 134px; height: 134px; }
    .now-mb { font-size: 30px; }
    .amount-btn { padding: 8px 2px 6px; }
    .amount-btn .ico { font-size: 18px; }
    .amount-btn .num { font-size: 14px; }
    .complete-bunny { width: 74px; height: 74px; }
    .brand-icon { width: 38px; height: 38px; }
    .brand-name { font-size: 13px; }
  }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="brand">
      <div class="brand-icon"></div>
      <div class="brand-text">
        <div class="brand-name">500MBモバイル通信</div>
        <button class="sim-display" id="simDisplay">📱 SIM未設定</button>
      </div>
    </div>
    <div class="premium-badge" id="premiumBadge">✨ プレミアム</div>
  </header>

  <main>
    <section class="panel">
      <div id="selectView">
        <div class="panel-label">どれくらい使う？</div>
        <div class="amount-grid">
          <button class="amount-btn" data-mb="100">
            <span class="ico">🍡</span>
            <div class="num">100</div>
            <div class="unit">MB</div>
          </button>
          <button class="amount-btn" data-mb="200">
            <span class="ico">🍩</span>
            <div class="num">200</div>
            <div class="unit">MB</div>
          </button>
          <button class="amount-btn" data-mb="250">
            <span class="ico">🍪</span>
            <div class="num">250</div>
            <div class="unit">MB</div>
          </button>
          <button class="amount-btn" data-mb="300">
            <span class="ico">🍰</span>
            <div class="num">300</div>
            <div class="unit">MB</div>
          </button>
          <button class="amount-btn" data-mb="500">
            <span class="ico">🎂</span>
            <div class="num">500</div>
            <div class="unit">MB</div>
          </button>
        </div>
      </div>

      <div id="progressView" class="hidden">
        <div class="progress-view">
          <div class="ring-wrap">
            <svg class="ring" viewBox="0 0 158 158">
              <defs>
                <linearGradient id="rainbow" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%"  stop-color="#ff3d8c"/>
                  <stop offset="20%" stop-color="#ff7a3d"/>
                  <stop offset="40%" stop-color="#ffd633"/>
                  <stop offset="60%" stop-color="#6fdcb6"/>
                  <stop offset="80%" stop-color="#7ec0ff"/>
                  <stop offset="100%" stop-color="#b48fe0"/>
                </linearGradient>
              </defs>
              <circle class="ring__track" cx="79" cy="79" r="66"/>
              <circle class="ring__bar" id="ringBar" cx="79" cy="79" r="66"/>
            </svg>
            <div class="ring-center">
              <div class="now-mb" id="nowMb">0<small>MB</small></div>
              <div class="now-target">/ <b id="targetMb">0</b> MB · <b id="percentMb">0</b>%</div>
            </div>
            <div class="ring-bunny"></div>
          </div>
          <div class="pstats">
            <div class="pstat">
              <div class="pstat-l">のこり</div>
              <div class="pstat-v" id="etaV">--<span class="pstat-u">s</span></div>
            </div>
            <div class="pstat">
              <div class="pstat-l">そくど</div>
              <div class="pstat-v" id="speedV">--<span class="pstat-u">MB/s</span></div>
            </div>
            <div class="pstat">
              <div class="pstat-l">けいか</div>
              <div class="pstat-v" id="elapsedV">0<span class="pstat-u">s</span></div>
            </div>
          </div>
          <button class="cancel-btn" id="cancelBtn">⛔ 接続中止</button>
        </div>
      </div>

      <div id="completeView" class="hidden">
        <div class="complete-view">
          <div class="confetti" id="confetti"></div>
          <div class="complete-bunny"></div>
          <div class="ctitle">完了したよ〜！</div>
          <div class="csub" id="csub">おつかれさま 🎉</div>
          <div class="cstats">
            <div class="pstat">
              <div class="pstat-l">しょうひ</div>
              <div class="pstat-v" id="cAmt">--<span class="pstat-u">MB</span></div>
            </div>
            <div class="pstat">
              <div class="pstat-l">じかん</div>
              <div class="pstat-v" id="cDur">--</div>
            </div>
            <div class="pstat">
              <div class="pstat-l">へいきん</div>
              <div class="pstat-v" id="cAvg">--<span class="pstat-u">MB/s</span></div>
            </div>
          </div>
          <button class="again-btn" id="againBtn">もう一度</button>
        </div>
      </div>
    </section>

    <section class="history-panel">
      <div class="history-head">
        <h3>📒 履歴・タイムログ</h3>
        <button class="history-clear hide" id="clearBtn">クリア</button>
      </div>
      <ul class="history-list" id="historyList">
        <li class="history-empty">
          <div class="bunny-mini"></div>
          <span>まだ履歴はないよ</span>
        </li>
      </ul>
    </section>
  </main>

  <div class="premium-bar" id="premiumBar">
    <div class="premium-text">
      <span class="em">✨</span>
      <span class="premium-msg"><b>¥300</b><small>/月</small> で広告非表示</span>
    </div>
    <button class="premium-btn" id="premiumBtn">登録</button>
  </div>

</div>

<div class="modal-bg hidden" id="adModal">
  <div class="modal">
    <div class="ad-label">広告</div>
    <div class="ad-content">
      <span class="big">🍰 お菓子の王国</span>
      はっぴーディアーズ<br>
      北海道直送のスイーツ<br>
      <small style="font-size:11px">▼ タップして詳しく ▼</small>
    </div>
    <button class="ad-close" id="adCloseBtn" disabled>閉じる (<span id="adCountdown">3</span>)</button>
    <div class="ad-note">プレミアム登録で広告は非表示になります</div>
  </div>
</div>

<script>
'use strict';

const STATE = {
  history: [],
  usageCount: 0,
  premium: false,
  activeSim: '',
  knownSims: [],
  abort: null,
  busy: false,
};

async function safeGet(key) {
  try { return await window.storage.get(key); } catch { return null; }
}
async function safeSet(key, value) {
  try { return await window.storage.set(key, value); } catch { return null; }
}
async function loadState() {
  const h = await safeGet('history');
  if (h && h.value) {
    try { STATE.history = JSON.parse(h.value); } catch { STATE.history = []; }
  }
  const u = await safeGet('usageCount');
  if (u && u.value) STATE.usageCount = parseInt(u.value, 10) || 0;
  const p = await safeGet('premium');
  if (p && p.value) STATE.premium = p.value === 'true';
  const as = await safeGet('activeSim');
  if (as && as.value) STATE.activeSim = as.value;
  const ks = await safeGet('knownSims');
  if (ks && ks.value) {
    try { STATE.knownSims = JSON.parse(ks.value); } catch { STATE.knownSims = []; }
  }
  renderHistory();
  renderPremium();
  renderSimDisplay();
}
async function saveState() {
  await safeSet('history', JSON.stringify(STATE.history.slice(0, 10)));
  await safeSet('usageCount', String(STATE.usageCount));
  await safeSet('premium', String(STATE.premium));
  await safeSet('activeSim', STATE.activeSim);
  await safeSet('knownSims', JSON.stringify(STATE.knownSims));
}

const $ = (id) => document.getElementById(id);
function fmtSec(s) {
  if (!isFinite(s) || s < 0) return '--';
  s = Math.round(s);
  if (s < 60) return s + 's';
  const m = Math.floor(s / 60), sec = s % 60;
  return m + ':' + String(sec).padStart(2, '0');
}
function fmtDate(iso) {
  const d = new Date(iso);
  const M = d.getMonth() + 1, D = d.getDate();
  const h = String(d.getHours()).padStart(2, '0');
  const m = String(d.getMinutes()).padStart(2, '0');
  return `${M}/${D} ${h}:${m}`;
}
function fmtPhone(p) {
  if (!p) return '';
  const d = String(p).replace(/\D/g, '');
  if (d.length === 11) return d.slice(0,3) + '-' + d.slice(3,7) + '-' + d.slice(7);
  if (d.length === 10) return d.slice(0,3) + '-' + d.slice(3,6) + '-' + d.slice(6);
  return d;
}

function showView(name) {
  ['selectView', 'progressView', 'completeView'].forEach(id => {
    $(id).classList.toggle('hidden', id !== name + 'View');
  });
}

function renderProgress(p) {
  const C = 2 * Math.PI * 66;
  const dash = (p.percent / 100) * C;
  $('ringBar').setAttribute('stroke-dasharray', `${dash} ${C - dash}`);
  $('nowMb').innerHTML = p.consumed.toFixed(1) + '<small>MB</small>';
  $('targetMb').textContent = p.total;
  $('percentMb').textContent = Math.floor(p.percent);
  $('etaV').innerHTML = fmtSec(p.eta).replace(/(\d+)s$/, '$1<span class="pstat-u">s</span>');
  $('speedV').innerHTML = p.speed.toFixed(1) + '<span class="pstat-u">MB/s</span>';
  $('elapsedV').innerHTML = fmtSec(p.elapsed).replace(/(\d+)s$/, '$1<span class="pstat-u">s</span>');
}

function renderHistory() {
  const ul = $('historyList');
  if (STATE.history.length === 0) {
    ul.innerHTML = '<li class="history-empty"><div class="bunny-mini"></div><span>まだ履歴はないよ</span></li>';
    $('clearBtn').classList.add('hide');
    return;
  }
  $('clearBtn').classList.remove('hide');
  ul.innerHTML = STATE.history.slice(0, 10).map(h => {
    const cls = 's' + (h.amount === 500 ? '500' : h.amount === 300 ? '300' : h.amount === 250 ? '250' : h.amount === 200 ? '200' : '100');
    const phone = h.sim ? fmtPhone(h.sim) : '';
    const phoneHtml = phone
      ? `<div class="hr-phone">📱 ${phone}</div>`
      : `<div class="hr-phone empty">📱 SIM未記録</div>`;
    return `<li class="history-row">
      <div class="hr-amount ${cls}">${h.amount}MB</div>
      <div class="hr-info">
        ${phoneHtml}
        <div class="hr-time">${fmtDate(h.timestamp)}</div>
      </div>
      <div class="hr-meta">
        <b>${fmtSec(h.duration)}</b>
        ${h.avgSpeed.toFixed(1)} MB/s
      </div>
    </li>`;
  }).join('');
}

function renderPremium() {
  const badge = $('premiumBadge');
  const bar = $('premiumBar');
  const btn = $('premiumBtn');
  const msg = bar.querySelector('.premium-msg');
  if (STATE.premium) {
    badge.classList.add('show');
    bar.classList.add('is-active');
    btn.textContent = '解約';
    msg.innerHTML = '<b>プレミアム会員</b><small> 広告非表示中</small>';
  } else {
    badge.classList.remove('show');
    bar.classList.remove('is-active');
    btn.textContent = '登録';
    msg.innerHTML = '<b>¥300</b><small>/月</small> で広告非表示';
  }
}

function renderSimDisplay() {
  const el = $('simDisplay');
  if (STATE.activeSim) {
    el.textContent = '📱 ' + fmtPhone(STATE.activeSim);
    el.classList.remove('is-empty');
  } else {
    el.textContent = '📱 SIM未設定';
    el.classList.add('is-empty');
  }
}

function renderSimList() {
  const list = $('simList');
  const label = $('simListLabel');
  if (STATE.knownSims.length === 0) {
    list.innerHTML = '';
    label.classList.add('hide');
    return;
  }
  label.classList.remove('hide');
  list.innerHTML = STATE.knownSims.map(s => {
    const active = s === STATE.activeSim;
    return `<div class="sim-item ${active ? 'is-active' : ''}" data-sim="${s}">
      ${active ? '<span class="sim-tag">使用中</span>' : ''}
      <span class="sim-num">${fmtPhone(s)}</span>
      <button class="sim-del" data-del="${s}" aria-label="削除">×</button>
    </div>`;
  }).join('');

  list.querySelectorAll('.sim-item').forEach(it => {
    it.addEventListener('click', (e) => {
      if (e.target.closest('.sim-del')) return;
      $('simInput').value = it.dataset.sim;
    });
  });
  list.querySelectorAll('.sim-del').forEach(b => {
    b.addEventListener('click', async (e) => {
      e.stopPropagation();
      const num = b.dataset.del;
      STATE.knownSims = STATE.knownSims.filter(s => s !== num);
      if (STATE.activeSim === num) STATE.activeSim = '';
      await saveState();
      renderSimList();
      renderSimDisplay();
    });
  });
}

function openSimModal() {
  $('simInput').value = STATE.activeSim || '';
  renderSimList();
  $('simModal').classList.remove('hidden');
  setTimeout(() => $('simInput').focus(), 50);
}
function closeSimModal() {
  $('simModal').classList.add('hidden');
}

async function saveSim() {
  const raw = $('simInput').value.replace(/\D/g, '');
  if (raw.length < 10 || raw.length > 11) {
    showToast('10〜11桁の番号を入力してください');
    return;
  }
  STATE.activeSim = raw;
  if (!STATE.knownSims.includes(raw)) STATE.knownSims.unshift(raw);
  if (STATE.knownSims.length > 8) STATE.knownSims = STATE.knownSims.slice(0, 8);
  await saveState();
  renderSimDisplay();
  closeSimModal();
  showToast('SIMを ' + fmtPhone(raw) + ' に切替');
}

function showToast(msg) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = document.createElement('div');
  t.className = 'toast'; t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

function spawnConfetti() {
  const wrap = $('confetti');
  wrap.innerHTML = '';
  const colors = ['#ff3d8c', '#ff7a3d', '#ffd633', '#6fdcb6', '#7ec0ff', '#b48fe0'];
  for (let i = 0; i < 28; i++) {
    const s = document.createElement('span');
    s.style.left = (Math.random() * 100) + '%';
    s.style.background = colors[i % colors.length];
    s.style.animationDelay = (Math.random() * 0.4) + 's';
    s.style.animationDuration = (1.2 + Math.random() * 0.8) + 's';
    s.style.transform = `rotate(${Math.random() * 360}deg)`;
    wrap.appendChild(s);
  }
}

function showAd() {
  return new Promise((resolve) => {
    const modal = $('adModal');
    const closeBtn = $('adCloseBtn');
    modal.classList.remove('hidden');
    closeBtn.disabled = true;
    let remain = 3;
    closeBtn.innerHTML = `閉じる (<span>${remain}</span>)`;
    const t = setInterval(() => {
      remain--;
      if (remain <= 0) {
        clearInterval(t);
        closeBtn.disabled = false;
        closeBtn.textContent = '閉じる';
      } else {
        closeBtn.innerHTML = `閉じる (<span>${remain}</span>)`;
      }
    }, 1000);
    closeBtn.onclick = () => {
      if (closeBtn.disabled) return;
      clearInterval(t);
      modal.classList.add('hidden');
      resolve();
    };
  });
}

const ENDPOINT = 'https://speed.cloudflare.com/__down?bytes=';
const CHUNK_BYTES = 20 * 1024 * 1024;
const PARALLEL = 4;

async function consume(totalMB) {
  if (STATE.busy) return;
  STATE.busy = true;
  document.querySelectorAll('.amount-btn').forEach(b => b.disabled = true);

  if (!STATE.premium && STATE.usageCount > 0 && STATE.usageCount % 3 === 0) {
    await showAd();
  }

  showView('progress');
  const targetBytes = totalMB * 1024 * 1024;
  const startTime = performance.now();
  let downloaded = 0;
  let completed = false;
  let networkError = null;
  STATE.abort = new AbortController();
  const signal = STATE.abort.signal;

  renderProgress({ percent: 0, consumed: 0, total: totalMB, speed: 0, eta: 0, elapsed: 0 });

  const queue = [];
  let remaining = targetBytes;
  while (remaining > 0) {
    const size = Math.min(CHUNK_BYTES, remaining);
    queue.push(size);
    remaining -= size;
  }

  const uiTimer = setInterval(() => {
    if (signal.aborted) return;
    const elapsed = (performance.now() - startTime) / 1000;
    const consumedMB = downloaded / 1024 / 1024;
    const speed = consumedMB / elapsed;
    const remMB = totalMB - consumedMB;
    const eta = speed > 0 ? remMB / speed : 0;
    renderProgress({
      percent: Math.min(100, (downloaded / targetBytes) * 100),
      consumed: Math.min(consumedMB, totalMB),
      total: totalMB,
      speed: speed,
      eta: eta,
      elapsed: elapsed,
    });
  }, 100);

  async function worker() {
    while (queue.length > 0 && !signal.aborted && downloaded < targetBytes) {
      const size = queue.shift();
      if (!size) break;
      const url = ENDPOINT + size + '&t=' + Date.now() + '-' + Math.random();
      let res;
      try {
        res = await fetch(url, { signal, cache: 'no-store' });
      } catch (e) {
        if (e.name !== 'AbortError') { networkError = e; STATE.abort.abort(); }
        return;
      }
      if (!res.ok) {
        networkError = new Error('HTTP ' + res.status);
        STATE.abort.abort();
        return;
      }
      const reader = res.body.getReader();
      try {
        while (!signal.aborted) {
          let chunk;
          try { chunk = await reader.read(); } catch (e) {
            if (e.name !== 'AbortError') { networkError = e; STATE.abort.abort(); }
            return;
          }
          if (chunk.done) break;
          downloaded += chunk.value.length;
          if (downloaded >= targetBytes) {
            completed = true;
            STATE.abort.abort();
            return;
          }
        }
      } finally {
        try { reader.cancel(); } catch {}
      }
    }
  }

  await Promise.allSettled(Array.from({ length: PARALLEL }, () => worker()));
  clearInterval(uiTimer);

  if (networkError) {
    showView('select');
    showToast('通信エラー: ' + networkError.message);
  } else if (completed) {
    const duration = (performance.now() - startTime) / 1000;
    const avgSpeed = totalMB / duration;
    renderProgress({
      percent: 100,
      consumed: totalMB,
      total: totalMB,
      speed: avgSpeed,
      eta: 0,
      elapsed: duration,
    });

    STATE.usageCount++;
    STATE.history.unshift({
      timestamp: new Date().toISOString(),
      amount: totalMB,
      duration: duration,
      avgSpeed: avgSpeed,
      sim: STATE.activeSim || '',
    });
    if (STATE.history.length > 10) STATE.history = STATE.history.slice(0, 10);
    await saveState();
    renderHistory();

    $('cAmt').innerHTML = totalMB + '<span class="pstat-u">MB</span>';
    $('cDur').textContent = fmtSec(duration);
    $('cAvg').innerHTML = avgSpeed.toFixed(1) + '<span class="pstat-u">MB/s</span>';
    $('csub').textContent = avgSpeed > 20 ? '爆速で消費したよ 🚀' : avgSpeed > 5 ? 'いい感じ ✨' : 'おつかれさま 🎉';
    showView('complete');
    spawnConfetti();
  } else {
    showView('select');
    showToast('中止しました');
  }

  STATE.busy = false;
  STATE.abort = null;
  document.querySelectorAll('.amount-btn').forEach(b => b.disabled = false);
}

document.querySelectorAll('.amount-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    consume(parseInt(btn.dataset.mb, 10));
  });
});
$('cancelBtn').addEventListener('click', () => {
  if (STATE.abort) STATE.abort.abort();
});
$('againBtn').addEventListener('click', () => showView('select'));
$('premiumBtn').addEventListener('click', async () => {
  STATE.premium = !STATE.premium;
  await saveState();
  renderPremium();
  showToast(STATE.premium ? '✨ プレミアム登録ありがとう！' : 'プレミアムを解約しました');
});
$('clearBtn').addEventListener('click', async () => {
  if (!confirm('履歴をすべて消しますか？')) return;
  STATE.history = [];
  STATE.usageCount = 0;
  await saveState();
  renderHistory();
});

// SIM management
$('simDisplay').addEventListener('click', openSimModal);
$('simCancelBtn').addEventListener('click', closeSimModal);
$('simSaveBtn').addEventListener('click', saveSim);
$('simInput').addEventListener('input', (e) => {
  e.target.value = e.target.value.replace(/\D/g, '').slice(0, 11);
});
$('simInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') saveSim();
});
$('simModal').addEventListener('click', (e) => {
  if (e.target.id === 'simModal') closeSimModal();
});

loadState();
</script>
<div class="modal-bg hidden" id="simModal">
  <div class="modal">
    <h3 class="modal-title">📱 SIMの電話番号</h3>
    <p class="modal-sub">この番号で履歴が記録されます。SIM差し替え時は切替してください。</p>

    <div class="sim-input-wrap">
      <input type="tel" id="simInput" placeholder="09012345678" inputmode="numeric" maxlength="11" autocomplete="off">
    </div>

    <div class="sim-list-label" id="simListLabel">保存済みのSIM</div>
    <div class="sim-list" id="simList"></div>

    <div class="modal-actions">
      <button class="modal-btn-sub" id="simCancelBtn">キャンセル</button>
      <button class="modal-btn" id="simSaveBtn">保存して切替</button>
    </div>
  </div>
</div>

</body>
</html>
